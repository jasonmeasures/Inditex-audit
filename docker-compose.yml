services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: inditex_audit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d inditex_audit"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5252:5252"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: audit
      PGPASSWORD: audit
      PGDATABASE: inditex_audit
      PORT: 5252
      JWT_SECRET: local-dev-secret
      INITIAL_ADMIN_USERNAME: admin
      INITIAL_ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
